name: Inspect today

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/inspect-today.mjs"

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/inspect-today.mjs
      - run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add analysis/today-debug.md
          git diff --staged --quiet || git commit -m "Today debug snapshot [skip ci]"
          git push
