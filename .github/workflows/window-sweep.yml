name: Window sweep

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/window-sweep.mjs"
      - ".github/workflows/window-sweep.yml"

permissions:
  contents: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Sweep windows
        run: node scripts/window-sweep.mjs
      - name: Commit sweep
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add analysis/window-sweep.md
          git diff --staged --quiet || git commit -m "Add window sweep [skip ci]"
          git push
